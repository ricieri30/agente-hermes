services:

  hermes:
    build:
      context: .
      dockerfile: hermes.Dockerfile
    image: hermes-agent-custom:latest
    container_name: hermes-agent
    restart: unless-stopped
    # TODAS as variáveis vêm do .env — sem hardcode aqui
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      # Volume de dados do hermes — onde fica auth.json, memórias, etc
      - hermes_data:/opt/data
      # Monta o projeto para o entrypoint ler o .env atualizado pelo dashboard
      - .:/opt/hermes_project
    # Hermes não precisa expor porta — só o dashboard precisa
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f hermes-agent > /dev/null && echo OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./dashboard
    image: hermes-dashboard:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    ports:
      # Dashboard acessível em http://SEU-IP:8080
      - "8080:3000"
    depends_on:
      - hermes
    environment:
      - HERMES_CONTAINER=hermes-agent
      - HERMES_ENV_FILE=/hermes_env/.env
      - DASHBOARD_PORT=3000
    volumes:
      # Acesso ao Docker socket para controlar o container hermes
      - /var/run/docker.sock:/var/run/docker.sock
      # Acesso ao .env para leitura/escrita pelo dashboard
      - .:/hermes_env

volumes:
  hermes_data:
    driver: local
