services:

  hermes:
    build:
      context: .
      dockerfile: hermes.Dockerfile
    image: hermes-agent-custom:latest
    container_name: hermes-agent
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - hermes_data:/opt/data
      - .:/opt/hermes_project
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'hermes-agent gateway' > /dev/null && echo OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: ./dashboard
    image: hermes-dashboard:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      - hermes
    environment:
      - HERMES_CONTAINER=hermes-agent
      - HERMES_ENV_FILE=/hermes_env/.env
      - DASHBOARD_PORT=3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/hermes_env

volumes:
  hermes_data:
    driver: local
