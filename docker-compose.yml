services:

  hermes:
    build:
      context: .
      dockerfile: hermes.Dockerfile
    image: hermes-agent-custom:latest
    container_name: hermes-agent
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      HERMES_MODEL: "${HERMES_MODEL:-groq:llama-3.3-70b-versatile}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      NOUS_API_KEY: "${NOUS_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      TELEGRAM_TOKEN: "${TELEGRAM_TOKEN:-}"
      TELEGRAM_ALLOWED_USERS: "${TELEGRAM_ALLOWED_USERS:-}"
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      TERMINAL_TIMEOUT: "60"
      TERMINAL_LIFETIME_SECONDS: "300"
      BROWSER_SESSION_TIMEOUT: "300"
      BROWSER_INACTIVITY_TIMEOUT: "120"
      WEB_TOOLS_DEBUG: "false"
      VISION_TOOLS_DEBUG: "false"
      MOA_TOOLS_DEBUG: "false"
    volumes:
      - hermes_data:/opt/data/.hermes
      - .:/opt/hermes_project
    expose:
      - "8080"
    stdin_open: true
    tty: true
    # Healthcheck simples — verifica se o processo está rodando
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -v grep | grep -qE '(hermes|python)' && echo OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: ./dashboard
    image: hermes-dashboard:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      - hermes
    environment:
      - HERMES_CONTAINER=hermes-agent
      - HERMES_ENV_FILE=/hermes_env/.env
      - DASHBOARD_PORT=3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/hermes_env

volumes:
  hermes_data:
    driver: local
