services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      - hermes_data:/opt/data

    ports:
      - "3000:8080"

    stdin_open: true
    tty: true

    command: >
      sh -c "
        mkdir -p ~/.hermes &&
        {
          echo HERMES_MODEL=$$HERMES_MODEL;
          echo GROQ_API_KEY=$$GROQ_API_KEY;
          echo GEMINI_API_KEY=$$GEMINI_API_KEY;
          echo OPENROUTER_API_KEY=$$OPENROUTER_API_KEY;
          [ -n \"$$NOUS_API_KEY\" ] && echo NOUS_API_KEY=$$NOUS_API_KEY;
          echo TELEGRAM_TOKEN=$$TELEGRAM_TOKEN;
          echo TELEGRAM_ALLOWED_USERS=$$TELEGRAM_ALLOWED_USERS;
          echo TERMINAL_TIMEOUT=$$TERMINAL_TIMEOUT;
          echo TERMINAL_LIFETIME_SECONDS=$$TERMINAL_LIFETIME_SECONDS;
        } > ~/.hermes/.env &&
        echo '--- Config criada em ~/.hermes/.env ---' &&
        cat ~/.hermes/.env | sed 's/=.*/=***/' &&
        echo '---------------------------------------' &&
        hermes gateway run
      "

  dashboard:
    build:
      context: ./dashboard
    image: hermes-dashboard:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      - hermes
    environment:
      - HERMES_CONTAINER=hermes-agent
      - HERMES_ENV_FILE=/hermes_env/.env
      - DASHBOARD_PORT=3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/hermes_env

volumes:
  hermes_data:
    driver: local
